<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 20px; }
        table { width: 90%; max-width: 600px; margin: 20px auto; border-collapse: collapse; background: #1e293b; border-radius: 10px; }
        th { background-color: #e11d48; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>
    <h2>Classificação Brasileirão 2026</h2>
    <table>
        <thead>
            <tr><th>#</th><th>Clube</th><th>Pts</th><th>V</th></tr>
        </thead>
        <tbody id="tabela-corpo">
        </tbody>
    </table>

    <script>
        // Os dados estão aqui dentro, não tem como dar erro de "não encontrado"
        const dados = [
            { "rank": 1, "team": "Flamengo", "points": 45, "wins": 14 },
            { "rank": 2, "team": "Palmeiras", "points": 42, "wins": 13 },
            { "rank": 3, "team": "Botafogo", "points": 40, "wins": 12 },
            { "rank": 4, "team": "São Paulo", "points": 38, "wins": 11 },
            { "rank": 5, "team": "Cruzeiro", "points": 35, "wins": 10 }
        ];

        const corpo = document.getElementById('tabela-corpo');
        
        dados.forEach(t => {
            corpo.innerHTML += `<tr>
                <td>${t.rank}</td>
                <td>${t.team}</td>
                <td>${t.points}</td>
                <td>${t.wins}</td>
            </tr>`;
        });
    </script>
</body>
</html>
