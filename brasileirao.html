<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Live</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2 style="text-align: center; color: white;">Tabela do Brasileirão 2026</h2>
    
    <table style="width: 80%; margin: 0 auto; color: white; border-collapse: collapse;">
        <thead>
            <tr style="background: #e11d48;">
                <th>#</th><th>Clube</th><th>Pts</th><th>V</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            <tr><td colspan="4" style="text-align: center;">Carregando dados...</td></tr>
        </tbody>
    </table>

    <script>
        const url = 'https://free-api-live-football-data.p.rapidapi.com/football-get-standing-all?leagueid=47';
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-key': 'fdc642a3cdmsh0941d5a585fdf92p1a9a4ajsncb3490f0d0f0',
                'x-rapidapi-host': 'free-api-live-football-data.p.rapidapi.com'
            }
        };

        async function carregarDados() {
            const corpo = document.getElementById('tabela-corpo');
            try {
                const response = await fetch(url, options);
                const result = await response.json();
                corpo.innerHTML = "";
                // Verifica se há dados
                if (result.response) {
                    result.response.forEach(t => {
                        corpo.innerHTML += `
                            <tr style="border-bottom: 1px solid #444; text-align: center;">
                                <td>${t.rank}</td>
                                <td>${t.team.name}</td>
                                <td>${t.points}</td>
                                <td>${t.all.win}</td>
                            </tr>`;
                    });
                }
            } catch (error) {
                corpo.innerHTML = "<tr><td colspan='4'>Erro ao carregar dados. Tente novamente mais tarde.</td></tr>";
            }
        }
        carregarDados();
    </script>
</body>
</html>
