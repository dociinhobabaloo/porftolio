<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Série A</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-image: url('img/brasileirao-jogadores.jpg'); background-size: cover; background-attachment: fixed; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.8); border-radius: 15px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        th, td { padding: 12px; border-bottom: 1px solid #444; text-align: center; }
        th { background: #e11d48; color: #fff; }
        .jogos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .card-jogo { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border-left: 4px solid #e11d48; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card-jogo small { color: #f43f5e; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Campeonato Brasileiro - Série A</h1>
        
        <h2>Classificação</h2>
        <table>
            <thead>
                <tr><th>#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th></tr>
            </thead>
            <tbody id="corpo-tabela">
                <!-- Preenchido via JavaScript -->
            </tbody>
        </table>

        <h2>Últimos Jogos</h2>
        <div id="lista-jogos" class="jogos-container">
            <!-- Preenchido via JavaScript -->
        </div>
    </div>

    <script>
        function carregarTabelaLocal() {
            const corpoTabela = document.getElementById('corpo-tabela');
            const containerJogos = document.getElementById('lista-jogos');

            // Dados estruturados localmente para garantir estabilidade total no GitHub Pages
            const classificacao = [
                { posicao: 1, time: "Flamengo", pontos: 0, jogos: 0, vitorias: 0 },
                { posicao: 2, time: "Palmeiras", pontos: 0, jogos: 0, vitorias: 0 },
                { posicao: 3, time: "São Paulo", pontos: 0, jogos: 0, vitorias: 0 },
                { posicao: 4, time: "Atlético-MG", pontos: 0, jogos: 0, vitorias: 0 },
                { posicao: 5, time: "Botafogo", pontos: 0, jogos: 0, vitorias: 0 },
                { posicao: 6, time: "Fluminense", pontos: 0, jogos: 0, vitorias: 0 },
                { posicao: 7, time: "Internacional", pontos: 0, jogos: 0, vitorias: 0 },
                { posicao: 8, time: "Grêmio", pontos: 0, jogos: 0, vitorias: 0 }
            ];

            const ultimosJogos = [
                { rodada: 1, mandante: "Flamengo", visitante: "São Paulo", placar: "- x -" },
                { rodada: 1, mandante: "Palmeiras", visitante: "Botafogo", placar: "- x -" },
                { rodada: 1, mandante: "Atlético-MG", visitante: "Fluminense", placar: "- x -" }
            ];

            corpoTabela.innerHTML = "";
            classificacao.forEach(t => {
                corpoTabela.innerHTML += `
                    <tr>
                       <td>${t.posicao}</td>
                       <td style="text-align: left;">${t.time}</td>
                       <td>${t.pontos}</td>
                       <td>${t.jogos}</td>
                       <td>${t.vitorias}</td>
                    </tr>`;
            });

            containerJogos.innerHTML = "";
            ultimosJogos.forEach(j => {
                containerJogos.innerHTML += `
                    <div class="card-jogo">
                        <small>Rodada ${j.rodada}</small>
                        <p><strong>${j.mandante}</strong> ${j.placar} <strong>${j.visitante}</strong></p>
                    </div>
                `;
            });
        }

        carregarTabelaLocal();
    </script>
</body>
</html>
