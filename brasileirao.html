<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Tabela Oficial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-image: url('fundo.jpg'); /* AJUSTE O NOME DO SEU ARQUIVO AQUI */
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center; 
            margin: 0; padding: 40px; text-align: center; color: #fff;
        }
        .botoes { margin-bottom: 30px; }
        button { 
            padding: 12px 30px; cursor: pointer; background: rgba(225, 29, 72, 0.9); 
            color: white; border: none; border-radius: 50px; font-weight: 700; 
            margin: 0 10px; transition: 0.3s;
        }
        button:hover { background: #e11d48; transform: scale(1.05); }
        table { 
            width: 100%; max-width: 1000px; margin: 0 auto; border-collapse: collapse; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
            border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        th { background-color: rgba(225, 29, 72, 0.8); padding: 15px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        details { cursor: pointer; text-align: left; }
        summary { font-weight: 700; list-style: none; }
    </style>
</head>
<body>

    <h1 style="text-shadow: 2px 2px 10px #000;">Classificação Brasileirão 2026</h1>
    <div class="botoes">
        <button onclick="renderizar('A')">Série A</button>
        <button onclick="renderizar('B')">Série B</button>
    </div>

    <table>
        <thead>
            <tr><th>#</th><th>Clube</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th>%</th></tr>
        </thead>
        <tbody id="tabela-corpo"></tbody>
    </table>

    <script>
        const dados = {
            'A': [
                { pos: 1, name: "Flamengo", p: 45, j: 20, v: 14, e: 3, d: 3, gp: 35, gc: 15, sg: 20, pct: 75, jogos: ["Vitória 2x0 sobre Palmeiras", "Vitória 3x1 sobre Fluminense", "Vitória 2x0 sobre Bahia"] },
                // Adicione os outros 19 times da Série A aqui seguindo o modelo acima
            ],
            'B': [
                { pos: 1, name: "Santos", p: 40, j: 20, v: 12, e: 4, d: 4, gp: 28, gc: 12, sg: 16, pct: 66, jogos: ["Vitória 2x0 sobre CRB", "Vitória 1x0 sobre Operário", "Empate 1x1 com Chapecoense"] },
                // Adicione os outros 19 times da Série B aqui seguindo o modelo acima
            ]
        };

        function renderizar(serie) {
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = "";
            dados[serie].forEach(t => {
                corpo.innerHTML += `<tr>
                    <td>${t.pos}</td>
                    <td>
                        <details>
                            <summary>▶ ${t.name}</summary>
                            <p style="font-size: 0.8em; margin-top: 5px; color: #ccc;">
                                <strong>Últimos jogos:</strong><br>${t.jogos.join('<br>')}
                            </p>
                        </details>
                    </td>
                    <td>${t.p}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td>
                    <td>${t.gp}</td><td>${t.gc}</td><td>${t.sg}</td><td>${t.pct}%</td>
                </tr>`;
            });
        }
        renderizar('A');
    </script>
</body>
</html>
