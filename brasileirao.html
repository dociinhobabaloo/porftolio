<script>
    async function carregarDados() {
        const corpo = document.getElementById('tabela-corpo');
        if (!corpo) return;

        corpo.innerHTML = "<tr><td colspan='4'>Buscando dados...</td></tr>";

        const apiUrl = 'https://free-api-live-football-data.p.rapidapi.com/football-get-standing-all?leagueid=71';
        const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(apiUrl);

        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const result = JSON.parse(data.contents);

            // ADICIONEI ESTE LOG PARA VOCÊ VER NO CONSOLE O QUE A API ENVIA
            console.log("Resposta completa da API:", result);

            corpo.innerHTML = "";
            
            // Tenta encontrar a lista de times em diferentes níveis do JSON
            const listaTimes = result.response || result.data || result;

            if (listaTimes && Array.isArray(listaTimes)) {
                listaTimes.forEach(t => {
                    corpo.innerHTML += `
                        <tr>
                            <td>${t.rank || '-'}</td>
                            <td>${t.team?.name || t.name || 'Time'}</td>
                            <td>${t.points || '0'}</td>
                            <td>${t.all?.win || '0'}</td>
                        </tr>`;
                });
            } else {
                corpo.innerHTML = "<tr><td colspan='4'>Formato de dados inesperado. Verifique o console.</td></tr>";
            }
        } catch (error) {
            console.error("Erro detalhado:", error);
            corpo.innerHTML = "<tr><td colspan='4'>Erro na conexão.</td></tr>";
        }
    }
    
    window.onload = carregarDados;
</script>
