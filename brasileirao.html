<script>
    // URL para Classificação da Liga 47 (Brasileirão)
    const url = 'https://free-api-live-football-data.p.rapidapi.com/football-get-standing-all?leagueid=47';
    const options = {
        method: 'GET',
        headers: {
            'x-rapidapi-key': 'fdc642a3cdmsh0941d5a585fdf92p1a9a4ajsncb3490f0d0f0',
            'x-rapidapi-host': 'free-api-live-football-data.p.rapidapi.com'
        }
    };

    async function carregarDados() {
        const corpo = document.getElementById('tabela-corpo');
        try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error('Erro na rede');
            const result = await response.json();
            
            corpo.innerHTML = ""; // Limpa o "Carregando..."
            
            // A maioria das APIs retorna a lista dentro de 'response'
            const times = result.response; 
            
            times.forEach(t => {
                corpo.innerHTML += `
                    <tr style="border-bottom: 1px solid #444;">
                        <td>${t.rank}</td>
                        <td>${t.team.name}</td>
                        <td>${t.points}</td>
                        <td>${t.all.win}</td>
                    </tr>`;
            });
        } catch (error) {
            corpo.innerHTML = "<tr><td colspan='4'>Erro: Verifique a API no RapidAPI.</td></tr>";
        }
    }
    carregarDados();
</script>
