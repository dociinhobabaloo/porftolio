<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Tabela Interativa</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 20px; }
        table { width: 95%; max-width: 600px; margin: 20px auto; border-collapse: collapse; background: #1e293b; border-radius: 10px; }
        th { background-color: #e11d48; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
        summary { cursor: pointer; color: #fb7185; font-weight: bold; }
        details { margin: 5px 0; }
    </style>
</head>
<body>

    <h2>Classificação Brasileirão 2026</h2>
    <table>
        <thead>
            <tr><th>#</th><th>Clube (Clique para ver jogos)</th><th>Pts</th></tr>
        </thead>
        <tbody id="tabela-corpo"></tbody>
    </table>

    <script>
        const times = [
            { rank: 1, name: "Flamengo", pts: 45, jogos: ["V 2x0 vs Vasco", "E 1x1 vs Palmeiras"] },
            { rank: 2, name: "Palmeiras", pts: 42, jogos: ["V 1x0 vs Botafogo", "V 2x1 vs São Paulo"] },
            { rank: 3, name: "Botafogo", pts: 40, jogos: ["D 0x1 vs Flamengo", "V 3x1 vs Cruzeiro"] },
            { rank: 4, name: "São Paulo", pts: 38, jogos: ["V 2x0 vs Grêmio", "D 1x2 vs Internacional"] },
            { rank: 5, name: "Cruzeiro", pts: 35, jogos: ["E 0x0 vs Bahia", "V 1x0 vs Fluminense"] }
            // Adicione os outros 15 times aqui seguindo o mesmo modelo
        ];

        const corpo = document.getElementById('tabela-corpo');
        times.forEach(t => {
            corpo.innerHTML += `<tr>
                <td>${t.rank}</td>
                <td>
                    <details>
                        <summary>${t.name}</summary>
                        <p>${t.jogos.join('<br>')}</p>
                    </details>
                </td>
                <td>${t.pts}</td>
            </tr>`;
        });
    </script>
</body>
</html>
