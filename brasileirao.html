<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <metaximo charset="UTF-8">
    <title>Brasileirão Séries A e B - Tabela e Jogos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-image: url('brasileirao-jogadores.jpg'); background-size: cover; background-attachment: fixed; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        .menu-campeonato { margin-bottom: 20px; }
        .menu-campeonato button { background: #333; color: #fff; border: 2px solid #e11d48; padding: 10px 20px; margin: 0 5px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .menu-campeonato button.ativo, .menu-campeonato button:hover { background: #e11d48; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.7); border-radius: 15px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 12px; border-bottom: 1px solid #444; text-align: center; }
        th { background: #e11d48; }
        .jogos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .card-jogo { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border-left: 4px solid #e11d48; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Campeonato Brasileiro</h1>
        
        <!-- Seletor de Série -->
        <div class="menu-campeonato">
            <button id="btn-serie-a" class="ativo" onclick="mudarCampeonato('BSA')">Série A</button>
            <button id="btn-serie-b" onclick="mudarCampeonato('BSB')">Série B</button>
        </div>
        
        <h2>Classificação</h2>
        <table>
            <thead>
                <tr><th>#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th></tr>
            </thead>
            <tbody id="corpo-tabela">
                <tr><td colspan="5">Carregando dados...</td></tr>
            </tbody>
        </table>

        <h2>Últimos Jogos</h2>
        <div id="lista-jogos" class="jogos-container">
            <p>Carregando últimos jogos...</p>
        </div>
    </div>

    <script>
        // Insira sua chave gratuita obtida em football-data.org
        const API_KEY = 'SUA_API_KEY_AQUI'; 
        let competenciaAtual = 'BSA'; // Começa na Série A

        async function carregarDados(codigoCompeticao) {
            const corpoTabela = document.getElementById('corpo-tabela');
            const containerJogos = document.getElementById('lista-jogos');
            
            corpoTabela.innerHTML = `<tr><td colspan="5">Carregando tabela...</td></tr>`;
            containerJogos.innerHTML = `<p>Carregando últimos jogos...</p>`;

            try {
                // Requisição da Tabela
                const respostaTabela = await fetch(`https://api.football-data.org/v4/competitions/${codigoCompeticao}/standings`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const dadosTabela = await respostaTabela.json();

                corpoTabela.innerHTML = "";
                const classificacao = dadosTabela.standings[0].table;
                classificacao.forEach(t => {
                    corpoTabela.innerHTML += `
                        <tr>
                            <td>${t.position}</td>
                            <td style="text-align: left;">${t.team.name}</td>
                            <td>${t.points}</td>
                            <td>${t.playedGames}</td>
                            <td>${t.won}</td>
                        </tr>`;
                });

                // Requisição das Partidas Finalizadas
                const respostaPartidas = await fetch(`https://api.football-data.org/v4/competitions/${codigoCompeticao}/matches?status=FINISHED`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const dadosPartidas = await respostaPartidas.json();

                containerJogos.innerHTML = "";
                const ultimos = dadosPartidas.matches.slice(-6).reverse();
                
                if(ultimos.length === 0) {
                    containerJogos.innerHTML = `<p>Nenhum jogo recente encontrado.</p>`;
                    return;
                }

                ultimos.forEach(j => {
                    containerJogos.innerHTML += `
                        <div class="card-jogo">
                            <small>Rodada ${j.matchday}</small>
                            <p><strong>${j.homeTeam.shortName}</strong> ${j.score.fullTime.home} x ${j.score.fullTime.away} <strong>${j.awayTeam.shortName}</strong></p>
                        </div>
                    `;
                });

            } catch (erro) {
                console.error("Erro ao buscar dados:", erro);
                corpoTabela.innerHTML = `<tr><td colspan="5">Erro ao carregar dados da API. Verifique sua chave.</td></tr>`;
            }
        }

        function mudarCampeonato(codigo) {
            competenciaAtual = codigo;
            
            // Alterna o estilo visual dos botões
            if(codigo === 'BSA') {
                document.getElementById('btn-serie-a').classList.add('ativo');
                document.getElementById('btn-serie-b').classList.remove('ativo');
            } else {
                document.getElementById('btn-serie-b').classList.add('ativo');
                document.getElementById('btn-serie-a').classList.remove('ativo');
            }

            carregarDados(competenciaAtual);
        }

        // Carrega a Série A por padrão ao abrir a página
        carregarDados(competenciaAtual);
    </script>
</body>
</html>
