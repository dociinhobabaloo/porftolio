<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 20px; }
        .botoes { margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #e11d48; color: white; border: none; border-radius: 5px; font-weight: bold; }
        table { width: 95%; max-width: 600px; margin: 20px auto; border-collapse: collapse; background: #1e293b; border-radius: 10px; }
        th { background-color: #e11d48; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
        details { cursor: pointer; }
    </style>
</head>
<body>

    <h2>Brasileirão 2026</h2>
    <div class="botoes">
        <button onclick="renderizar('A')">Série A</button>
        <button onclick="renderizar('B')">Série B</button>
    </div>

    <table>
        <thead><tr><th>#</th><th>Clube</th><th>Pts</th></tr></thead>
        <tbody id="tabela-corpo"></tbody>
    </table>

    <script>
        const dados = {
            'A': [
                { rank: 1, name: "Flamengo", pts: 45, jogos: ["V 2x0 vs Vasco", "E 1x1 vs Palmeiras"] },
                { rank: 2, name: "Palmeiras", pts: 42, jogos: ["V 1x0 vs Botafogo", "V 2x1 vs São Paulo"] }
                // Adicione os outros times da Série A aqui...
            ],
            'B': [
                { rank: 1, name: "Sport", pts: 30, jogos: ["V 1x0 vs Coritiba", "E 0x0 vs Ceará"] },
                { rank: 2, name: "Ceará", pts: 28, jogos: ["V 2x1 vs Goiás", "E 0x0 vs Sport"] }
                // Adicione os outros times da Série B aqui...
            ]
        };

        function renderizar(serie) {
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = "";
            dados[serie].forEach(t => {
                corpo.innerHTML += `<tr>
                    <td>${t.rank}</td>
                    <td>
                        <details>
                            <summary>${t.name}</summary>
                            <p style="font-size: 0.8em; color: #cbd5e1;">${t.jogos.join('<br>')}</p>
                        </details>
                    </td>
                    <td>${t.pts}</td>
                </tr>`;
            });
        }
        
        // Carrega Série A ao iniciar
        renderizar('A');
    </script>
</body>
</html>
