<script>
    function tocarMusica() {
        const audio = document.getElementById('audio-fundo');
        const botao = document.getElementById('btn-som');
        
        // Garante que o Chrome recarregue a rota do arquivo e dê o play no mesmo instante do clique
        audio.load();
        let playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.then(_ => {
                // Áudio começou a tocar com sucesso, esconde o botão
                botao.style.display = 'none';
            }).catch(error => {
                console.log("O Chrome impediu o autoplay, aguardando nova interação.");
            });
        }
    }

    function carregarTabela() {
        const corpoTabela = document.getElementById('corpo-tabela');
        const containerJogos = document.getElementById('lista-jogos');

        dadosBrasileirao.classificacao.forEach(t => {
            corpoTabela.innerHTML += `
                <tr>
                   <td>${t.posicao}</td>
                   <td style="text-align: left; font-weight: 500;">${t.time}</td>
                   <td>${t.pontos}</td>
                   <td>${t.jogos}</td>
                   <td>${t.vitorias}</td>
                </tr>`;
        });

        containerJogos.innerHTML = "";
        dadosBrasileirao.ultimosJogos.forEach(j => {
            containerJogos.innerHTML += `
                <div class="card-jogo">
                    <small>Rodada ${j.rodada}</small>
                    <p><strong>${j.mandante}</strong> x <strong>${j.visitante}</strong></p>
