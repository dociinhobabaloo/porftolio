<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Série A</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-image: url('brasileirao-jogadores.jpg'); background-size: cover; background-attachment: fixed; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.7); border-radius: 15px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 12px; border-bottom: 1px solid #444; text-align: center; }
        th { background: #e11d48; }
        .jogos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .card-jogo { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border-left: 4px solid #e11d48; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Campeonato Brasileiro - Série A</h1>
        
        <h2>Classificação</h2>
        <table>
            <thead>
                <tr><th>#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th></tr>
            </thead>
            <tbody id="corpo-tabela">
                <tr><td colspan="5">Carregando tabela da API...</td></tr>
            </tbody>
        </table>

        <h2>Últimos Jogos</h2>
        <div id="lista-jogos" class="jogos-container">
            <p>Carregando últimos jogos...</p>
        </div>
    </div>

    <script>
        const API_KEY = '51acf7de2cbb4e5e9af676a5090c7ad9'; 

        async function carregarDadosBrasileirao() {
            const corpoTabela = document.getElementById('corpo-tabela');
            const containerJogos = document.getElementById('lista-jogos');

            try {
                // Tabela da Série A (BSA)
                const respostaTabela = await fetch('https://api.football-data.org/v4/competitions/BSA/standings', {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const dadosTabela = await respostaTabela.json();

                corpoTabela.innerHTML = "";
                const classificacao = dadosTabela.standings[0].table;
                classificacao.forEach(t => {
                    corpoTabela.innerHTML += `
                        <tr>
                            <td>${t.position}</td>
                            <td style="text-align: left;">${t.team.name}</td>
                            <td>${t.points}</td>
                            <td>${t.playedGames}</td>
                            <td>${t.won}</td>
                        </tr>`;
                });

                // Partidas Finalizadas da Série A
                const respostaPartidas = await fetch('https://api.football-data.org/v4/competitions/BSA/matches?status=FINISHED', {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const dadosPartidas = await respostaPartidas.json();

                containerJogos.innerHTML = "";
                const ultimos = dadosPartidas.matches.slice(-6).reverse();
                
                if(ultimos.length === 0) {
                    containerJogos.innerHTML = `<p>Nenhum jogo recente encontrado.</p>`;
                    return;
                }

                ultimos.forEach(j => {
                    containerJogos.innerHTML += `
                        <div class="card-jogo">
                            <small>Rodada ${j.matchday}</small>
                            <p><strong>${j.homeTeam.shortName}</strong> ${j.score.fullTime.home} x ${j.score.fullTime.away} <strong>${j.awayTeam.shortName}</strong></p>
                        </div>
                    `;
                });

            } catch (erro) {
                console.error("Erro ao buscar dados:", erro);
                corpoTabela.innerHTML = `<tr><td colspan="5">Erro ao carregar dados da API.</td></tr>`;
            }
        }

        carregarDadosBrasileirao();
    </script>
</body>
</html>
