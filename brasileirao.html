<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Tabela Oficial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-image: url('brasileirao-jogadores.jpg'); background-size: cover; background-attachment: fixed; color: #fff; margin: 0; padding: 20px; text-align: center; }
        table { width: 100%; max-width: 900px; margin: 20px auto; border-collapse: collapse; background: rgba(0,0,0,0.7); border-radius: 15px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #444; }
        th { background: #e11d48; }
    </style>
</head>
<body>
    <h1>Brasileirão 2026</h1>
    <table>
        <thead><tr><th>#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th></tr></thead>
        <tbody id="corpo-tabela"></tbody>
    </table>

    <script>
        const times = [
            { pos: 1, nome: "Flamengo", pts: 45, j: 20, v: 14 },
            { pos: 2, nome: "Palmeiras", pts: 42, j: 20, v: 13 },
            { pos: 3, nome: "Botafogo", pts: 40, j: 20, v: 12 },
            { pos: 4, nome: "Fluminense", pts: 38, j: 20, v: 11 },
            { pos: 5, nome: "São Paulo", pts: 36, j: 20, v: 10 },
            { pos: 6, nome: "Internacional", pts: 35, j: 20, v: 10 },
            { pos: 7, nome: "Grêmio", pts: 34, j: 20, v: 9 },
            { pos: 8, nome: "Atlético-MG", pts: 33, j: 20, v: 9 },
            { pos: 9, nome: "Bahia", pts: 32, j: 20, v: 8 },
            { pos: 10, nome: "Cruzeiro", pts: 30, j: 20, v: 8 },
            { pos: 11, nome: "Fortaleza", pts: 29, j: 20, v: 7 },
            { pos: 12, nome: "Bragantino", pts: 28, j: 20, v: 7 },
            { pos: 13, nome: "Vasco", pts: 27, j: 20, v: 6 },
            { pos: 14, nome: "Athletico-PR", pts: 26, j: 20, v: 6 },
            { pos: 15, nome: "Cuiabá", pts: 25, j: 20, v: 5 },
            { pos: 16, nome: "Coritiba", pts: 24, j: 20, v: 5 },
            { pos: 17, nome: "Vitória", pts: 22, j: 20, v: 4 },
            { pos: 18, nome: "Atlético-GO", pts: 20, j: 20, v: 4 },
            { pos: 19, nome: "Juventude", pts: 18, j: 20, v: 3 },
            { pos: 20, nome: "Criciúma", pts: 15, j: 20, v: 2 }
        ];

        const corpo = document.getElementById('corpo-tabela');
        times.forEach(t => {
            corpo.innerHTML += `<tr><td>${t.pos}</td><td>${t.nome}</td><td>${t.pts}</td><td>${t.j}</td><td>${t.v}</td></tr>`;
        });
    </script>
</body>
</html>
