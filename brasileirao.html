<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tabela Brasileirão 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; color: #333; padding: 20px; }
        table { width: 100%; max-width: 900px; margin: 20px auto; border-collapse: collapse; background: white; }
        th { background-color: #007bff; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        details { cursor: pointer; text-align: left; }
    </style>
</head>
<body>

    <h2>Classificação Brasileirão Série A</h2>
    <table>
        <thead>
            <tr><th>#</th><th>Clube</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th>%</th></tr>
        </thead>
        <tbody id="tabela-corpo"></tbody>
    </table>

    <script>
        const serieA = [
            { pos: 1, name: "Palmeiras", p: 41, j: 18, v: 12, e: 5, d: 1, gp: 30, gc: 13, sg: 17, pct: 75, jogos: ["V 2x0", "V 1x0", "E 1x1"] },
            { pos: 2, name: "Flamengo", p: 34, j: 17, v: 10, e: 4, d: 3, gp: 31, gc: 16, sg: 15, pct: 66, jogos: ["D 0x1", "V 3x1", "V 2x0"] },
            { pos: 3, name: "Fluminense", p: 31, j: 18, v: 9, e: 4, d: 5, gp: 28, gc: 23, sg: 5, pct: 57, jogos: ["E 2x2", "V 1x0", "D 0x1"] },
            { pos: 4, name: "Athletico-PR", p: 30, j: 18, v: 9, e: 3, d: 6, gp: 24, gc: 18, sg: 6, pct: 55, jogos: ["V 2x1", "D 1x2", "V 1x0"] }
        ];

        const corpo = document.getElementById('tabela-corpo');
        serieA.forEach(t => {
            corpo.innerHTML += `<tr>
                <td>${t.pos}</td>
                <td>
                    <details>
                        <summary>${t.name}</summary>
                        <p>Últimos jogos: ${t.jogos.join(', ')}</p>
                    </details>
                </td>
                <td>${t.p}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td>
                <td>${t.gp}</td><td>${t.gc}</td><td>${t.sg}</td><td>${t.pct}</td>
            </tr>`;
        });
    </script>
</body>
</html>
