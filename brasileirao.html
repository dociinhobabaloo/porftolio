<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Tabela Completa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            /* SUBSTITUA 'fundo.jpg' PELO NOME DA SUA IMAGEM */
            background-image: url('brasileirao-jogadores-.jpg'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center; 
            margin: 0; padding: 30px; text-align: center; color: #fff;
        }
        .botoes { margin-bottom: 25px; }
        button { 
            padding: 10px 25px; cursor: pointer; background: rgba(225, 29, 72, 0.9); 
            color: white; border: none; border-radius: 30px; font-weight: 700; 
            margin: 0 10px; transition: 0.3s;
        }
        button:hover { background: #e11d48; transform: translateY(-2px); }
        table { 
            width: 100%; max-width: 1000px; margin: 0 auto; border-collapse: collapse; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
            border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        th { background-color: rgba(225, 29, 72, 0.7); padding: 12px; font-size: 0.9em; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9em; }
        details { cursor: pointer; }
        summary { font-weight: 700; list-style: none; text-align: left; padding-left: 10px;}
        summary::marker { content: '▶ '; color: #e11d48; }
        details[open] > summary::marker { content: '▼ '; }
    </style>
</head>
