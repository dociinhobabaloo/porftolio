        body {

            background-image: url('brasileirao-jogadores.jpg'); 
            background-size: cover;

            background-position: center;

        }

        button {

            color: white; border: none; border-radius: 30px; font-weight: 700; 
            margin: 0 10px; transition: 0.3s;
        }
        button:hover { background: #e11d48; transform: translateY(-2px); }
        table { 
            width: 100%; max-width: 1000px; margin: 0 auto; border-collapse: collapse; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
            border-radius: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        th { background-color: rgba(225, 29, 72, 0.8); padding: 15px; text-transform: uppercase; font-size: 0.85em; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        details { cursor: pointer; text-align: left; }
        summary { font-weight: 700; list-style: none; padding-left: 10px; }
        summary::marker { content: '▶ '; color: #e11d48; }
        details[open] > summary::marker { content: '▼ '; }
    </style>
</head>
