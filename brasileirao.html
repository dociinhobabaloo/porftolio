<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Série A</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-image: url('img/brasileirao-jogadores.jpg'); background-size: cover; background-attachment: fixed; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        h1, h2 { text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        /* Estilo do Botão de Voltar */
        .btn-voltar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(15, 23, 42, 0.85);
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            margin-bottom: 15px;
            float: left;
        }
        .btn-voltar:hover {
            background: #e11d48;
            border-color: #e11d48;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(225, 29, 72, 0.4);
        }

        .limpar { clear: both; }

        .tabela-container { max-height: 400px; overflow-y: auto; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.7); margin-bottom: 30px; }
        .tabela-container::-webkit-scrollbar { width: 8px; }
        .tabela-container::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.9); }
        .tabela-container::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; background: rgba(15, 23, 42, 0.9); }
        th, td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 14px; }
        th { background: #e11d48; color: #fff; font-weight: 700; text-transform: uppercase; position: sticky; top: 0; z-index: 1; }
        tr:hover { background: rgba(255, 255, 255, 0.05); }
        
        .jogos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .card-jogo { background: rgba(15, 23, 42, 0.9); padding: 15px; border-radius: 10px; border-left: 4px solid #e11d48; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.7); }
        .card-jogo small { color: #f43f5e; font-weight: bold; }
    </style>
</head>
<body>
    <!-- Áudio invisível e automático -->
    <audio id="audio-fundo" autoplay loop style="display: none;">
        <source src="musica-brasileirao.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <!-- Botão de Voltar para a página anterior ou index -->
        <a href="index.html" class="btn-voltar">← Voltar</a>
        <div class="limpar"></div>

        <h1>Campeonato Brasileiro - Série A</h1>
        
        <h2>Classificação 2026 (Live)</h2>
        <div class="tabela-container">
            <table>
                <thead>
                    <tr><th>#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th></tr>
                </thead>
                <tbody id="corpo-tabela">
                    <!-- Preenchido via script -->
                </tbody>
            </table>
        </div>

        <h2>Últimos Jogos</h2>
        <div id="lista-jogos" class="jogos-container">
            <!-- Preenchido via script -->
        </div>
    </div>

    <script>
        fetch('dados.json')
            .then(response => response.json())
            .then(dadosBrasileirao => {
                const corpoTabela = document.getElementById('corpo-tabela');
                const containerJogos = document.getElementById('lista-jogos');

                corpoTabela.innerHTML = "";
                dadosBrasileirao.classificacao.forEach(t => {
                    corpoTabela.innerHTML += `
                        <tr>
                           <td>${t.posicao}</td>
                           <td style="text-align: left; font-weight: 500;">${t.time}</td>
                           <td>${t.pontos}</td>
                           <td>${t.jogos}</td>
                           <td>${t.vitorias}</td>
                        </tr>`;
                });

                containerJogos.innerHTML = "";
                dadosBrasileirao.ultimosJogos.forEach(j => {
                    containerJogos.innerHTML += `
                        <div class="card-jogo">
                            <small>Rodada ${j.rodada}</small>
                            <p><strong>${j.mandante}</strong> x <strong>${j.visitante}</strong></p>
                            <p style="margin: 5px 0 0 0; font-size: 13px; color: #cbd5e1;">${j.placar}</p>
                        </div>
                    `;
                });
            })
            .catch(error => console.error('Erro ao carregar o arquivo dados.json:', error));
    </script>
</body>
</html>
