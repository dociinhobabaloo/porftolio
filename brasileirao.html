<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Brasileirão 2026 - Tabela</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 20px; }
        table { width: 90%; max-width: 600px; margin: 20px auto; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th { background-color: #e11d48; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <h2>Classificação Brasileirão 2026</h2>
    <table>
        <thead>
            <tr><th>#</th><th>Clube</th><th>Pts</th><th>V</th></tr>
        </thead>
        <tbody id="tabela-corpo">
            <tr><td colspan="4">Carregando...</td></tr>
        </tbody>
    </table>

    <script>
        async function carregar() {
            const corpo = document.getElementById('tabela-corpo');
            try {
                const url = 'https://free-api-live-football-data.p.rapidapi.com/football-get-standing-all?leagueid=71';
                const response = await fetch(url, {
                    headers: { 'x-rapidapi-key': 'fdc642a3cdmsh0941d5a585fdf92p1a9a4ajsncb3490f0d0f0' }
                });

                const json = await response.json();
                
                // Inspeção dos dados
                console.log("Objeto recebido:", json);
                
                // Aqui está o segredo: procuramos o array dentro de json.response
                // Se o console mostrou 'response', provavelmente ele é um objeto que contém a lista
                const dados = json.response.standings || json.response.table || json.response;

                corpo.innerHTML = "";
                
                if (Array.isArray(dados)) {
                    dados.forEach(t => {
                        corpo.innerHTML += `<tr>
                            <td>${t.rank || '-'}</td>
                            <td>${t.team?.name || 'Time'}</td>
                            <td>${t.points || '0'}</td>
                            <td>${t.all?.win || '0'}</td>
                        </tr>`;
                    });
                } else {
                    corpo.innerHTML = "<tr><td colspan='4'>Erro: Estrutura dos dados não encontrada.</td></tr>";
                }
            } catch (e) {
                corpo.innerHTML = "<tr><td colspan='4'>Erro na conexão.</td></tr>";
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
