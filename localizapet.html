<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Localiza Pet - Vila Velha</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Caminho corrigido apontando para dentro da pasta img */
            background-image: url('img/animais.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0f172a;
        }

        /* Botão de Voltar discreto no canto */
        .btn-voltar {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            text-decoration: none;
            padding: 9px 20px;
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        .btn-voltar:hover {
            background: #e11d48;
            border-color: #e11d48;
        }
    </style>
</head>
<body>

    <!-- Botão de Voltar -->
    <a href="index.html" class="btn-voltar">← Voltar</a>

</body>
</html>
